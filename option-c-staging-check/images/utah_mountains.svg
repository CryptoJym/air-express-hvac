<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="30%" stop-color="#1E3A5F"/>
      <stop offset="60%" stop-color="#3A6B9F"/>
      <stop offset="100%" stop-color="#E8A87C"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A6778"/>
      <stop offset="100%" stop-color="#3D4858"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48654A"/>
      <stop offset="100%" stop-color="#2D4A30"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  
  <!-- Sun glow -->
  <circle cx="1500" cy="520" r="200" fill="#F6AD55" opacity="0.3"/>
  <circle cx="1500" cy="520" r="120" fill="#ED8936" opacity="0.4"/>
  <circle cx="1500" cy="520" r="60" fill="#FBD38D" opacity="0.6"/>
  
  <!-- Far mountains (Wasatch range) -->
  <path d="M-100,700 L200,350 L350,450 L500,300 L650,420 L800,280 L950,380 L1050,250 L1200,350 L1350,280 L1500,320 L1650,240 L1800,350 L1920,300 L2020,700 Z" fill="url(#mountain1)" opacity="0.7"/>
  
  <!-- Snow caps -->
  <path d="M450,340 L500,300 L550,340 Z" fill="url(#snow)" opacity="0.9"/>
  <path d="M750,320 L800,280 L850,320 Z" fill="url(#snow)" opacity="0.9"/>
  <path d="M1000,290 L1050,250 L1100,290 Z" fill="url(#snow)" opacity="0.95"/>
  <path d="M1300,320 L1350,280 L1400,315 Z" fill="url(#snow)" opacity="0.9"/>
  <path d="M1600,280 L1650,240 L1700,275 Z" fill="url(#snow)" opacity="0.95"/>
  
  <!-- Mid mountains -->
  <path d="M-100,750 L100,500 L300,580 L450,450 L600,530 L750,420 L900,500 L1100,400 L1300,480 L1450,420 L1600,470 L1750,400 L1920,460 L2020,750 Z" fill="url(#mountain2)" opacity="0.8"/>
  
  <!-- Snow on mid mountains -->
  <path d="M400,490 L450,450 L500,490 Z" fill="url(#snow)" opacity="0.8"/>
  <path d="M700,460 L750,420 L800,455 Z" fill="url(#snow)" opacity="0.85"/>
  <path d="M1050,440 L1100,400 L1150,435 Z" fill="url(#snow)" opacity="0.8"/>
  
  <!-- Foothills -->
  <path d="M-100,800 L150,650 L350,700 L550,620 L750,680 L950,600 L1150,660 L1350,610 L1550,650 L1750,590 L1920,630 L2020,800 Z" fill="#3D5A3E" opacity="0.85"/>
  
  <!-- Valley/ground -->
  <path d="M-100,850 L0,780 L200,800 L400,770 L600,790 L800,760 L1000,780 L1200,755 L1400,775 L1600,750 L1800,770 L1920,760 L1920,1080 L-100,1080 Z" fill="url(#ground)"/>
  
  <!-- Suburban homes silhouette -->
  <g fill="#2D4A30" opacity="0.6">
    <!-- House 1 -->
    <rect x="200" y="810" width="60" height="40"/>
    <polygon points="195,810 230,785 265,810"/>
    <!-- House 2 -->
    <rect x="350" y="800" width="70" height="50"/>
    <polygon points="345,800 385,770 420,800"/>
    <!-- House 3 -->
    <rect x="550" y="815" width="55" height="35"/>
    <polygon points="545,815 577,790 610,815"/>
    <!-- House 4 -->
    <rect x="750" y="805" width="65" height="45"/>
    <polygon points="745,805 782,775 820,805"/>
    <!-- House 5 -->
    <rect x="1000" y="800" width="60" height="50"/>
    <polygon points="995,800 1030,770 1065,800"/>
    <!-- House 6 -->
    <rect x="1200" y="810" width="55" height="40"/>
    <polygon points="1195,810 1227,785 1260,810"/>
    <!-- House 7 -->
    <rect x="1400" y="795" width="70" height="55"/>
    <polygon points="1395,795 1435,765 1475,795"/>
    <!-- House 8 -->
    <rect x="1600" y="808" width="58" height="42"/>
    <polygon points="1595,808 1629,780 1663,808"/>
  </g>
  
  <!-- Trees scattered -->
  <g fill="#1D3A1F" opacity="0.5">
    <ellipse cx="150" cy="830" rx="20" ry="35"/>
    <ellipse cx="300" cy="820" rx="18" ry="30"/>
    <ellipse cx="480" cy="825" rx="22" ry="38"/>
    <ellipse cx="680" cy="818" rx="20" ry="32"/>
    <ellipse cx="880" cy="822" rx="25" ry="40"/>
    <ellipse cx="1120" cy="815" rx="20" ry="35"/>
    <ellipse cx="1320" cy="825" rx="18" ry="30"/>
    <ellipse cx="1520" cy="810" rx="22" ry="38"/>
    <ellipse cx="1720" cy="820" rx="20" ry="33"/>
  </g>
  
  <!-- Atmospheric haze -->
  <rect x="0" y="600" width="1920" height="480" fill="url(#sky)" opacity="0.1"/>
</svg>